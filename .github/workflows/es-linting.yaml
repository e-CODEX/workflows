name: ES Linting
description: Lint the code using ESLint and TypeScript

on:
    workflow_call:
        inputs:
            working-directory:
                type: string
                default: "."
            node-version:
                type: string
                default: "22.22.0"
            max-warnings:
                type: number
                default: -1   # -1 = don't gate on warnings
            typecheck:
                type: boolean
                default: false

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ${{ inputs.working-directory }}
        steps:
            -   name: Checkout code
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            -   name: Setup Node.js
                uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
                with:
                    node-version: ${{ inputs.node-version }}
                    cache: npm
                    cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

            -   name: Install dependencies
                run: npm ci

            -   name: ESLint
                run: npm run lint ${{ inputs.max-warnings >= 0 && format('-- --max-warnings {0}', inputs.max-warnings) || '' }}

            -   name: TypeScript
                if: inputs.typecheck
                run: npx tsc --noEmit
