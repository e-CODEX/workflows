on:
  workflow_call:
    secrets:
      QODANA_TOKEN:
        required: true
  
permissions:
  contents: read

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
        contents: write
        security-events: write # required for uploading SARIF files
        pull-requests: write # required for updating PR comments
        checks: write
    name: Analyze with Qodana
    steps:
      

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # to check out the actual pull request commit, not the merge commit
          fetch-depth: 0  # a full history is required for pull request analysis

      - name: Qodana Scan
        uses: JetBrains/qodana-action@d7b5ec2fbec32197ef447c450e00589ed5f34fd5 #v2026.1.0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}          

      - name: Upload results to Github
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
