name: "Publish Snapshot to Maven Repository"
on:
  workflow_call:
    inputs:
      java-version:
        description: "Java version to use for the build."
        required: true
        default: 21
        type: number
      gradle-parameters:
        description: "Extra parameters to pass to Gradle"
        required: false
        type: string
        default: ""
      maven-repo-id:
        description: "Maven repository ID"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-snapshot:
    name: Publish Snapshot to Maven Repository
    permissions:
      contents: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Graphviz
        uses: e-CODEX/workflows/.github/actions/install-graphviz@main

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4.3.1

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@f748a0599171a192a2668afee8d0497f7c1069df # v4.5.6
        id: setup-jfrog-cli
        env:
          JF_URL: https://scm.ecodex.eu
        with:
          oidc-provider-name: setup-jfrog

      - name: Submit Dependency Snapshot to GitHub Advanced Security
        uses: mikepenz/gradle-dependency-submission@v1
        # Alternative: advanced-security/gradle-dependency-submission-action

      - name: Check if version is Snapshot
        id: check-version
        run: |
          VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
          if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
            echo "Version $VERSION is a SNAPSHOT version."
            echo "snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION is a final version."
            echo "snapshot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Snapshot
        if: ${{ steps.check-version.outputs.snapshot == 'true' }}
        env:
          MAVEN_REPO_ID: ${{ inputs.maven-repo-id }}
          MAVEN_REPO_USERNAME: ${{ steps.setup-jfrog-cli.outputs.oidc-user }}
          MAVEN_REPO_PASSWORD: ${{ steps.setup-jfrog-cli.outputs.oidc-token }}
        run: ./gradlew publish ${{ inputs.gradle-parameters }}
